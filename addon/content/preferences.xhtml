<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <description data-l10n-id="pref-provider-help"></description>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-provider-select"
      data-l10n-id="pref-provider"
    ></html:label>
    <html:select
      id="zotero-prefpane-__addonRef__-provider-select"
    ></html:select>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-base-url"
      data-l10n-id="pref-openai-base-url"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-base-url"
      preference="openaiBaseUrl"
    ></html:input>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-model-select"
      data-l10n-id="pref-openai-model"
    ></html:label>
    <html:select id="zotero-prefpane-__addonRef__-model-select"></html:select>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-model-custom"
      data-l10n-id="pref-openai-model-custom"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-model-custom"
      data-l10n-id="pref-openai-model-custom-placeholder"
    ></html:input>
  </hbox>
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-api-key"
      data-l10n-id="pref-openai-api-key"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-key"
      preference="openaiApiKey"
    ></html:input>
  </hbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
