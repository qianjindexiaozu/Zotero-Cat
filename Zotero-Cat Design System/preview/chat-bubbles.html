<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 520px;
      }
      .msg {
        border-radius: 6px;
        padding: 8px 30px 8px 10px;
        line-height: 1.4;
        max-width: 92%;
        font-size: 14px;
        position: relative;
        word-break: break-word;
      }
      .user {
        align-self: flex-end;
        background: rgba(45, 127, 249, 0.2);
      }
      .asst {
        align-self: flex-start;
        background: rgba(26, 26, 31, 0.08);
      }
      .meta {
        color: rgba(26, 26, 31, 0.55);
        font-size: 11px;
        margin-top: 6px;
      }
      .stream::after {
        content: "▋";
        animation: b 0.8s step-end infinite;
        margin-left: 2px;
      }
      @keyframes b {
        50% {
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="msg user">Summarize the methods section in 3 bullets.</div>
      <div class="msg asst">
        The authors fine-tune a 7B base model on 12k preference pairs collected
        from graduate-student annotators.
        <div class="meta">2.4s · gpt-4o</div>
      </div>
      <div class="msg asst stream">
        Comparing to RLHF baselines, they report
      </div>
    </div>
  </body>
</html>
