<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .hd {
        position: sticky;
        top: 0;
        backdrop-filter: saturate(180%) blur(18px);
        background: color-mix(in srgb, #fafaf7 75%, transparent);
        border-bottom: 1px solid color-mix(in srgb, #e6e5dd 60%, transparent);
      }
      .inner {
        padding: 14px 22px;
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 16px;
      }
      nav {
        display: flex;
        gap: 18px;
        font-size: 14px;
        margin-left: auto;
      }
      nav a {
        color: #6b6b72;
        text-decoration: none;
      }
      nav a:hover {
        color: #1a1a1f;
      }
      .gh {
        font-size: 13px;
        color: #6b6b72;
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 6px;
      }
      .gh:hover {
        background: #e6e5dd;
        color: #1a1a1f;
      }
    </style>
  </head>
  <body>
    <div class="hd">
      <div class="inner">
        <div class="logo">
          <img
            src="../assets/icon-cat-line-filled.svg"
            width="28"
            height="28"
          />Zotero‑Cat
        </div>
        <nav><a>Features</a><a>Guide</a><a>Download</a><a>FAQ</a></nav>
        <a class="gh">GitHub ↗</a>
      </div>
    </div>
    <div style="height: 80px"></div>
  </body>
</html>
