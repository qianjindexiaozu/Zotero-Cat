<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 18px;
        text-align: center;
      }
      .g {
        font-size: 24px;
        line-height: 1;
      }
      .n {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--color-fg-muted);
        margin-top: 6px;
      }
      .acc {
        color: #5aa3f5;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div>
        <div class="g">→</div>
        <div class="n">cta after</div>
      </div>
      <div>
        <div class="g">↗</div>
        <div class="n">external</div>
      </div>
      <div>
        <div class="g acc">_</div>
        <div class="n">cursor</div>
      </div>
      <div>
        <div class="g acc">▋</div>
        <div class="n">stream</div>
      </div>
      <div>
        <div class="g">·</div>
        <div class="n">separator</div>
      </div>
      <div>
        <div class="g">➤</div>
        <div class="n">send</div>
      </div>
      <div>
        <div class="g">■</div>
        <div class="n">stop</div>
      </div>
      <div>
        <div class="g">⧉</div>
        <div class="n">copy</div>
      </div>
    </div>
  </body>
</html>
