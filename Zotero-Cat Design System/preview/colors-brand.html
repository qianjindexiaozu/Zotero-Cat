<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-fg)}
  .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .swatch{display:flex;flex-direction:column;gap:6px}
  .chip{width:64px;height:64px;border-radius:14px;border:1px solid var(--color-border)}
  .name{font-size:13px;font-weight:600;letter-spacing:-0.01em}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-muted)}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#5AA3F5"></div><div class="name">brand-orange</div><div class="hex">#5AA3F5</div></div>
  <div class="swatch"><div class="chip" style="background:#3D8BFF"></div><div class="name">orange-ink</div><div class="hex">#3D8BFF</div></div>
  <div class="swatch"><div class="chip" style="background:#1A1A1F"></div><div class="name">graphite</div><div class="hex">#1A1A1F</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">paper</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch"><div class="chip" style="background:#4ECDC4"></div><div class="name">signal</div><div class="hex">#4ECDC4</div></div>
</div>
</body></html>
