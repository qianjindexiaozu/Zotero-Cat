<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 40px;
        background: #f5f7fb;
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .card {
        background: #ffffff;
        border: 1.5px solid #e3e6ee;
        border-radius: 18px;
        padding: 28px;
        box-shadow:
          0 1px 2px rgba(20, 30, 60, 0.04),
          0 8px 28px -16px rgba(20, 30, 60, 0.1);
        max-width: 760px;
      }
      .row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 16px;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-fg-muted);
        min-width: 60px;
      }
      .btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 22px;
        border-radius: 12px;
        font-weight: 500;
        font-size: 15px;
        text-decoration: none;
        border: 2px solid transparent;
        cursor: pointer;
        background: transparent;
        color: var(--color-fg);
        transition:
          transform 220ms cubic-bezier(0.32, 0.72, 0, 1),
          background 220ms cubic-bezier(0.32, 0.72, 0, 1),
          box-shadow 220ms cubic-bezier(0.32, 0.72, 0, 1),
          color 220ms cubic-bezier(0.32, 0.72, 0, 1),
          border-color 220ms cubic-bezier(0.32, 0.72, 0, 1);
        will-change: transform;
        letter-spacing: -0.005em;
      }
      .btn:active {
        transform: scale(0.96);
      }
      /* Primary: very light tinted blue */
      .primary {
        background: #f0f6ff;
        color: #3d8bff;
        border-color: #d6e4fa;
        box-shadow:
          0 1px 2px rgba(61, 139, 255, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      .primary:hover {
        background: #e5efff;
        border-color: #bbd2f5;
        box-shadow:
          0 6px 18px -10px rgba(61, 139, 255, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      /* Filled: lighter friendly blue (sky), not deep */
      .filled {
        background: #5aa3f5;
        color: #fff;
        border-color: #7fb6f5;
        box-shadow:
          0 1px 2px rgba(61, 139, 255, 0.16),
          0 4px 12px -6px rgba(61, 139, 255, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .filled:hover {
        background: #4a95ee;
        border-color: #6daaee;
        box-shadow:
          0 8px 22px -10px rgba(61, 139, 255, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      /* Ghost */
      .ghost {
        background: rgba(255, 255, 255, 0.7);
        color: var(--color-fg);
        border-color: #d5d9e2;
        backdrop-filter: saturate(180%) blur(12px);
        box-shadow:
          0 1px 2px rgba(20, 30, 60, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }
      .ghost:hover {
        background: #ffffff;
        border-color: #b9bfcb;
        box-shadow:
          0 6px 16px -10px rgba(20, 30, 60, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }
      .pressed {
        transform: scale(0.96);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <span class="label">primary</span
        ><button class="btn primary">5-min start →</button
        ><button
          class="btn primary"
          style="background: #e5efff; border-color: #bbd2f5"
        >
          hover</button
        ><button class="btn primary pressed">pressed</button>
      </div>
      <div class="row">
        <span class="label">filled</span
        ><button class="btn filled">Get started →</button
        ><button
          class="btn filled"
          style="background: #4a95ee; border-color: #6daaee"
        >
          hover</button
        ><button class="btn filled pressed">pressed</button>
      </div>
      <div class="row">
        <span class="label">ghost</span
        ><button class="btn ghost">View on GitHub</button
        ><button
          class="btn ghost"
          style="background: #ffffff; border-color: #b9bfcb"
        >
          hover</button
        ><button class="btn ghost pressed">pressed</button>
      </div>
      <p
        style="
          color: var(--color-fg-muted);
          font-size: 13px;
          max-width: 540px;
          margin-top: 8px;
          margin-bottom: 0;
        "
      >
        Light sky-blue palette — friendly, not heavy. Thicker 2px borders +
        inner highlight + soft drop shadow give layered depth without darkening
        the page.
      </p>
    </div>
  </body>
</html>
