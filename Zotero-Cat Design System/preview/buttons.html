<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:40px;background:#F5F7FB;font-family:var(--font-sans);color:var(--color-fg)}
  .card{background:#FFFFFF;border:1.5px solid #E3E6EE;border-radius:18px;padding:28px;box-shadow:0 1px 2px rgba(20,30,60,.04),0 8px 28px -16px rgba(20,30,60,.10);max-width:760px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-muted);min-width:60px}
  .btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:12px;font-weight:500;font-size:15px;text-decoration:none;border:2px solid transparent;cursor:pointer;background:transparent;color:var(--color-fg);
    transition:transform 220ms cubic-bezier(.32,.72,0,1),background 220ms cubic-bezier(.32,.72,0,1),box-shadow 220ms cubic-bezier(.32,.72,0,1),color 220ms cubic-bezier(.32,.72,0,1),border-color 220ms cubic-bezier(.32,.72,0,1);
    will-change:transform;letter-spacing:-0.005em}
  .btn:active{transform:scale(.96)}
  /* Primary: very light tinted blue */
  .primary{background:#F0F6FF;color:#3D8BFF;border-color:#D6E4FA;box-shadow:0 1px 2px rgba(61,139,255,.06),inset 0 1px 0 rgba(255,255,255,.8)}
  .primary:hover{background:#E5EFFF;border-color:#BBD2F5;box-shadow:0 6px 18px -10px rgba(61,139,255,.35),inset 0 1px 0 rgba(255,255,255,.8)}
  /* Filled: lighter friendly blue (sky), not deep */
  .filled{background:#5AA3F5;color:#FFF;border-color:#7FB6F5;box-shadow:0 1px 2px rgba(61,139,255,.16),0 4px 12px -6px rgba(61,139,255,.30),inset 0 1px 0 rgba(255,255,255,.35)}
  .filled:hover{background:#4A95EE;border-color:#6DAAEE;box-shadow:0 8px 22px -10px rgba(61,139,255,.40),inset 0 1px 0 rgba(255,255,255,.35)}
  /* Ghost */
  .ghost{background:rgba(255,255,255,.7);color:var(--color-fg);border-color:#D5D9E2;backdrop-filter:saturate(180%) blur(12px);box-shadow:0 1px 2px rgba(20,30,60,.05),inset 0 1px 0 rgba(255,255,255,.7)}
  .ghost:hover{background:#FFFFFF;border-color:#B9BFCB;box-shadow:0 6px 16px -10px rgba(20,30,60,.18),inset 0 1px 0 rgba(255,255,255,.7)}
  .pressed{transform:scale(.96)}
</style></head><body>
<div class="card">
  <div class="row"><span class="label">primary</span><button class="btn primary">5-min start →</button><button class="btn primary" style="background:#E5EFFF;border-color:#BBD2F5">hover</button><button class="btn primary pressed">pressed</button></div>
  <div class="row"><span class="label">filled</span><button class="btn filled">Get started →</button><button class="btn filled" style="background:#4A95EE;border-color:#6DAAEE">hover</button><button class="btn filled pressed">pressed</button></div>
  <div class="row"><span class="label">ghost</span><button class="btn ghost">View on GitHub</button><button class="btn ghost" style="background:#FFFFFF;border-color:#B9BFCB">hover</button><button class="btn ghost pressed">pressed</button></div>
  <p style="color:var(--color-fg-muted);font-size:13px;max-width:540px;margin-top:8px;margin-bottom:0">Light sky-blue palette — friendly, not heavy. Thicker 2px borders + inner highlight + soft drop shadow give layered depth without darkening the page.</p>
</div>
</body></html>
