<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .row {
        display: flex;
        gap: 28px;
        align-items: center;
      }
      img {
        display: block;
      }
      .l {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-fg-muted);
        margin-top: 6px;
        text-align: center;
      }
      .lockup {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div>
        <img src="../assets/icon-cat-line-filled.svg" width="56" height="56" />
        <div class="l">filled · 56</div>
      </div>
      <div>
        <img src="../assets/icon-cat-line.svg" width="80" height="80" />
        <div class="l">line · 80</div>
      </div>
      <div>
        <div class="lockup">
          <img
            src="../assets/icon-cat-line-filled.svg"
            width="36"
            height="36"
          />Zotero‑Cat
        </div>
        <div class="l">lockup</div>
      </div>
      <div style="background: #1a1a1f; padding: 14px; border-radius: 14px">
        <img
          src="../assets/icon-cat-line.svg"
          width="56"
          height="56"
          style="filter: invert(1)"
        />
        <div class="l" style="color: #888">on dark</div>
      </div>
    </div>
  </body>
</html>
