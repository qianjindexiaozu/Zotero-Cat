<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .scale {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }
      .swatch {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .chip {
        height: 60px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
      }
      .name {
        font-size: 12px;
        font-weight: 600;
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--color-fg-muted);
      }
      .label {
        font-size: 11px;
        color: var(--color-fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="label">Paper · light surfaces</div>
    <div class="scale">
      <div class="swatch">
        <div class="chip" style="background: #ffffff"></div>
        <div class="name">paper-0</div>
        <div class="hex">#FFFFFF</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #fafaf7"></div>
        <div class="name">paper-1</div>
        <div class="hex">#FAFAF7</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #f2f1ea"></div>
        <div class="name">paper-2</div>
        <div class="hex">#F2F1EA</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #eceae0"></div>
        <div class="name">paper-3</div>
        <div class="hex">#ECEAE0</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #e6e5dd"></div>
        <div class="name">paper-4</div>
        <div class="hex">#E6E5DD</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #c8c7bd"></div>
        <div class="name">paper-5</div>
        <div class="hex">#C8C7BD</div>
      </div>
    </div>
    <div class="label" style="margin-top: 18px">Ink · text + dark surfaces</div>
    <div class="scale">
      <div class="swatch">
        <div class="chip" style="background: #1a1a1f"></div>
        <div class="name">ink-1</div>
        <div class="hex">#1A1A1F</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #3a3a42"></div>
        <div class="name">ink-2</div>
        <div class="hex">#3A3A42</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #6b6b72"></div>
        <div class="name">ink-3</div>
        <div class="hex">#6B6B72</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #9a9aa2"></div>
        <div class="name">ink-4</div>
        <div class="hex">#9A9AA2</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #0f0f12"></div>
        <div class="name">dark-bg</div>
        <div class="hex">#0F0F12</div>
      </div>
      <div class="swatch">
        <div class="chip" style="background: #15151a"></div>
        <div class="name">dark-surf</div>
        <div class="hex">#15151A</div>
      </div>
    </div>
  </body>
</html>
