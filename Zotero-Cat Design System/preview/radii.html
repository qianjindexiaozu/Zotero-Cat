<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-fg)}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:60px;height:60px;background:var(--color-surface);border:1px solid var(--color-border)}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-muted)}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">r-xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">r-sm · 6</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">r-md · 10</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">r-lg · 14</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">r-xl · 20</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">pill · 999</div></div>
</div>
</body></html>
