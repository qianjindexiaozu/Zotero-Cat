<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .row {
        display: flex;
        gap: 32px;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .box {
        background: #5aa3f5;
      }
      .name {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-fg-muted);
      }
      .label {
        font-size: 11px;
        color: var(--color-fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <div class="label">
      8pt spacing scale · 4 · 8 · 12 · 16 · 24 · 32 · 48 · 80
    </div>
    <div class="row">
      <div class="item">
        <div class="box" style="width: 4px; height: 4px"></div>
        <div class="name">sp-1 · 4</div>
      </div>
      <div class="item">
        <div class="box" style="width: 8px; height: 8px"></div>
        <div class="name">sp-2 · 8</div>
      </div>
      <div class="item">
        <div class="box" style="width: 12px; height: 12px"></div>
        <div class="name">sp-3 · 12</div>
      </div>
      <div class="item">
        <div class="box" style="width: 16px; height: 16px"></div>
        <div class="name">sp-4 · 16</div>
      </div>
      <div class="item">
        <div class="box" style="width: 24px; height: 24px"></div>
        <div class="name">sp-5 · 24</div>
      </div>
      <div class="item">
        <div class="box" style="width: 32px; height: 32px"></div>
        <div class="name">sp-6 · 32</div>
      </div>
      <div class="item">
        <div class="box" style="width: 48px; height: 48px"></div>
        <div class="name">sp-8 · 48</div>
      </div>
      <div class="item">
        <div class="box" style="width: 80px; height: 80px"></div>
        <div class="name">sp-10 · 80</div>
      </div>
    </div>
  </body>
</html>
