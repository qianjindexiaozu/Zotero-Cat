<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--color-bg);
        font-family: var(--font-sans);
        color: var(--color-fg);
      }
      .term {
        background: #15151a;
        color: #e8e8ec;
        border-radius: 14px;
        overflow: hidden;
        font-family: var(--font-mono);
        box-shadow: 0 30px 60px -30px rgba(0, 0, 0, 0.45);
        max-width: 580px;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .r {
        background: #ff5f57;
      }
      .y {
        background: #febc2e;
      }
      .g {
        background: #28c840;
      }
      .name {
        margin-left: auto;
        font-size: 14px;
        color: rgba(232, 232, 236, 0.6);
      }
      .body {
        padding: 18px;
        font-size: 15px;
      }
      .cur {
        color: #5aa3f5;
        animation: b 0.8s step-end infinite;
      }
      @keyframes b {
        50% {
          opacity: 0;
        }
      }
      .muted {
        color: rgba(232, 232, 236, 0.55);
      }
      .acc {
        color: #5aa3f5;
      }
    </style>
  </head>
  <body>
    <div class="term">
      <div class="bar">
        <span class="dot r"></span><span class="dot y"></span
        ><span class="dot g"></span><span class="name">~/your-paper.pdf</span>
      </div>
      <div class="body">
        <span class="muted">$</span> cat paper.pdf |
        <span class="acc">zotero-cat</span> --explain<span class="cur">_</span>
      </div>
    </div>
  </body>
</html>
