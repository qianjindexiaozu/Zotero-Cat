<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-fg)}
  .wrap{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:6px 14px;border:1px solid #E6E5DD;border-radius:999px;font-size:14px;font-weight:600;color:#6B6B72;text-decoration:none;transition:border-color 140ms,color 140ms}
  .chip:hover{border-color:#1A1A1F;color:#1A1A1F}
  .chip.active{border-color:#5AA3F5;color:#3D8BFF}
</style></head><body>
<div class="wrap">
  <span class="chip">OpenAI</span>
  <span class="chip">Anthropic</span>
  <span class="chip">DeepSeek</span>
  <span class="chip">Moonshot</span>
  <span class="chip">智谱</span>
  <span class="chip">Ollama</span>
  <span class="chip">LM Studio</span>
  <span class="chip">vLLM</span>
  <span class="chip active">SearXNG</span>
  <span class="chip">DuckDuckGo</span>
  <span class="chip">OpenRouter</span>
</div>
</body></html>
