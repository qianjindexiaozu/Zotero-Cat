<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--color-bg);font-family:var(--font-sans);color:var(--color-fg)}
  .qs{display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .step{display:inline-flex;align-items:center;gap:10px}
  .num{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #1A1A1F;border-radius:50%;font-family:var(--font-mono);font-weight:600;font-size:14px}
  .label{font-weight:600;font-size:15px}
  .sep{color:#9A9AA2}
</style></head><body>
<div class="qs">
  <div class="step"><span class="num">1</span><span class="label">Install plugin</span></div>
  <span class="sep">→</span>
  <div class="step"><span class="num">2</span><span class="label">Pick a provider</span></div>
  <span class="sep">→</span>
  <div class="step"><span class="num">3</span><span class="label">Paste API Key once</span></div>
  <span class="sep">→</span>
  <div class="step"><span class="num">4</span><span class="label">Start chatting</span></div>
</div>
</body></html>
