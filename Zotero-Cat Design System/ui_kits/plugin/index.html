<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><title>Zotero-Cat · plugin item-pane</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body{margin:0;background:#E6E5DD;font-family:var(--font-sans);color:var(--color-fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
  .frame{background:#FFFFFF;border:1px solid #D6D5CB;border-radius:12px;width:380px;padding:14px 14px 12px;box-shadow:0 14px 40px -10px rgba(20,20,25,.18)}
  .section-hd{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#3A3A42;padding-bottom:10px;border-bottom:1px solid color-mix(in srgb,#1A1A1F 12%,transparent);margin-bottom:8px}
  .section-hd img{width:16px;height:16px}
  .root{display:flex;flex-direction:column;gap:8px;height:360px;overflow:hidden}
  .messages{border:1px solid color-mix(in srgb,#1A1A1F 20%,transparent);border-radius:6px;display:flex;flex:1;flex-direction:column;gap:6px;min-height:0;overflow-y:auto;padding:8px;font-size:13px}
  .msg{border-radius:6px;line-height:1.4;max-width:92%;padding:6px 30px 6px 8px;position:relative;word-break:break-word}
  .user{align-self:flex-end;background:color-mix(in srgb,#2D7FF9 20%,transparent)}
  .asst{align-self:flex-start;background:color-mix(in srgb,#1A1A1F 8%,transparent)}
  .meta{color:color-mix(in srgb,#1A1A1F 55%,transparent);font-size:11px;margin-top:6px}
  .stream::after{content:"▋";animation:b .8s step-end infinite;margin-left:1px}
  @keyframes b{50%{opacity:.35}}
  .copy{position:absolute;right:6px;top:6px;width:18px;height:18px;border:1px solid color-mix(in srgb,#1A1A1F 26%,transparent);background:color-mix(in srgb,#1A1A1F 12%,transparent);border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:.6;cursor:pointer}
  .controls{border-top:1px solid color-mix(in srgb,#1A1A1F 10%,transparent);display:flex;flex-direction:column;gap:6px;padding-top:6px;font-size:11px;color:#6B6B72}
  .ctx-row{display:flex;gap:10px;flex-wrap:wrap}
  .ctx-row label{display:inline-flex;gap:4px;align-items:center}
  .preview{border:1px solid color-mix(in srgb,#1A1A1F 14%,transparent);border-radius:6px;padding:5px 7px;display:flex;justify-content:space-between;font-size:11px}
  .preview .t{font-weight:600;color:#3A3A42}
  .preview .b{color:#6B6B72}
  .row{display:flex;gap:6px;align-items:center}
  .row select,.row input{flex:1;font:inherit;font-size:11px;padding:3px 6px;border:1px solid color-mix(in srgb,#1A1A1F 18%,transparent);border-radius:5px;background:#FFF;min-width:0}
  .ghost-btn{background:color-mix(in srgb,#1A1A1F 5%,transparent);border:1px solid color-mix(in srgb,#1A1A1F 18%,transparent);border-radius:5px;color:inherit;font-size:11px;padding:3px 7px;cursor:pointer}
  .composer{align-items:center;border-top:1px solid color-mix(in srgb,#1A1A1F 12%,transparent);display:flex;gap:8px;padding:6px 2px 6px 0}
  .composer input{flex:1;font:inherit;font-size:13px;padding:6px 8px;border:1px solid color-mix(in srgb,#1A1A1F 18%,transparent);border-radius:6px;background:#FFF}
  .send{background:color-mix(in srgb,#2D7FF9 12%,transparent);border:1px solid color-mix(in srgb,#2D7FF9 45%,transparent);border-radius:6px;color:#1A4FA3;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
</style></head>
<body>
<div class="frame">
  <div class="section-hd"><img src="../../assets/icon-cat-line-filled.svg" alt="">Zotero‑Cat</div>
  <div class="root">
    <div class="messages">
      <div class="msg user">用一句话总结这篇论文的方法。<button class="copy">⧉</button></div>
      <div class="msg asst">作者在 12k 偏好对上微调了一个 7B 基座模型，标注来自研究生级别的注释员。<div class="meta">2.4s · gpt-4o · 1,284 tokens</div><button class="copy">⧉</button></div>
      <div class="msg asst stream">与 RLHF 基线相比，他们报告</div>
    </div>
    <div class="controls">
      <div class="row"><span style="flex:none">Session</span><select><option>2026-05-07 · 4 messages</option></select><button class="ghost-btn">New</button><button class="ghost-btn">Clear</button></div>
      <div class="row"><select><option>gpt-4o</option></select><button class="ghost-btn">Fetch models</button><select style="flex:0 1 110px"><option>medium</option></select></div>
      <div class="ctx-row"><label><input type="checkbox" checked>Metadata</label><label><input type="checkbox" checked>Notes</label><label><input type="checkbox" checked>Annotations</label><label><input type="checkbox">Web search</label></div>
      <div class="preview"><span class="t">Context preview</span><span class="b">≈ 2,140 / 128k tokens</span></div>
    </div>
    <div class="composer"><input placeholder="Ask about this paper…"><button class="send">➤</button></div>
  </div>
</div>
</body></html>
